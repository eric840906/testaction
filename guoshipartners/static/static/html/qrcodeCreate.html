        <style>
            body {
                margin: 0;
            }
            #content {
                width: 300px;

                position: absolute;
                left: 0;
                right: 0;
                margin: 0 auto;
            }

            #canvas {
                width: 300px;
                height: 300px;
            }
            .paramDiv {
                padding-top: 24px;
            }
            .key,
            .value,
            .file_ext {
                display: inline-block;
            }
            .key {
                width: 100px;
            }
            .value,
            .value input {
                width: 195px;
            }

            .file_ext input {
                margin-right: 4px;
                margin-left: 4px;
            }

            #download_btn,
            #create_btn {
                height: 32px;
                color: #f7fff9;
                line-height: 16px;
                margin: 0 4px;
            }
        </style>
        <title>QRCode 產生器</title>
    </head>
    <body>
        <div id="content">
            <div id="canvas"></div>

            <div class="paramDiv">
                <div class="key">url :</div>
                <div class="value">
                    <input id="url" type="text" />
                </div>
            </div>
            <div class="paramDiv">
                <div class="key">onead logo :</div>
                <div class="value">
                    <input id="oneadlogo_check" type="checkbox" style="width: auto" />
                </div>
            </div>
            <div class="paramDiv">
                <div class="key">logo :</div>
                <div class="value">
                    <input id="customlogo_file" type="file" />
                </div>
            </div>
            <div class="paramDiv">
                <div class="key">副檔名 :</div>
                <div class="file_ext"><input id="" name="ext" value="png" type="radio" checked /> png <input id="" name="ext" value="jpg" type="radio" /> jpg <input id="" name="ext" value="svg" type="radio" /> svg</div>
            </div>
            <div class="paramDiv">
                <div class="key">transparent :</div>
                <div class="value">
                    <input id="transparent_check" type="checkbox" style="width: auto" />
                </div>
            </div>

            <div class="paramDiv" style="text-align: center">
                <button id="create_btn" class="btn btn-info">產生 QR CODE</button>
                <button id="download_btn" class="btn btn-success">下載 QR CODE</button>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="./library/qr-code-styling.js"></script>

        <script>
            var qrCode;
            function createQRCODE(url, logo) {
                const isTransparent = document.getElementById('transparent_check').checked;

                qrCode = new QRCodeStyling({
                    width: 300,
                    height: 300,
                    type: 'png',
                    data: url,
                    image: logo || '',
                    dotsOptions: {
                        color: '#000000',
                        type: 'rounded',
                    },
                    backgroundOptions: {
                        color: `${isTransparent ? 'transparent' : '#FFFFFF'}`,
                    },
                    imageOptions: {
                        crossOrigin: 'anonymous',
                        margin: 20,
                        imageSize: 0.4,
                    },
                });

                const canvas = document.getElementById('canvas');
                canvas.firstChild?.remove();
                qrCode.append(document.getElementById('canvas'));
                console.log('[ONEAD] QRCode is Create.');
            }

            document.getElementById('create_btn').addEventListener('click', () => {
                const url = document.getElementById('url').value;
                const onead_logo_checkBox = document.getElementById('oneadlogo_check').checked;
                const onead_logo = `../images/onead_logo.svg`;
                const custom_logo = document.getElementById('customlogo_file').files[0];

                if (onead_logo_checkBox) {
                    createQRCODE(url, onead_logo);
                } else if (custom_logo) {
                    const reader = new FileReader();
                    reader.readAsDataURL(custom_logo);
                    reader.onload = function () {
                        createQRCODE(url, reader.result);
                    };
                } else {
                    createQRCODE(url, null);
                }
            });
            document.getElementById('download_btn').addEventListener('click', () => {
                if (qrCode) {
                    const ext = document.querySelector('input[name="ext"]:checked').value || 'png';
                    const t = new Date();
                    const offset = t.getTimezoneOffset();
                    const date = new Date(t.getTime() - offset * 60 * 1000);
                    const ssid = date.toISOString().replaceAll('-', '').replaceAll(':', '').split('.')[0];
                    qrCode.download({ name: `onead-qrcode-${ssid}`, extension: ext });
                }
            });
        </script>
    </body>
</html>
