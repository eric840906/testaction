    <script type='text/javascript'>
        (function () {
            var s = document.createElement('script'), el = document.getElementsByTagName('script')[0]; s.async = true;
            s.src = (document.location.protocol === 'https:' ? 'https:' : 'http:') + '//ad-specs.guoshipartners.com/static/js/onead-pixel.min.js';

            // production 環境，onload 省略
            s.onload = function () {
                // debugger

                    // document.getElementById('cookie').innerText = '1st cookie == ' + ONEAD_PIXEL_UTIL.get_cookie('oid').oid;

                }, 1000)

            };
            // production 環境，onload 省略: END

            el.parentNode.insertBefore(s, el);
        })();
        window.onead_pixel = window.onead_pixel || [];
        window.onead_pixel.push({
            uid: 550729276,
            type: 'init',
            // host:'https://staging.onead.com.tw/'
        });
        window.onead_pixel.push({
            type: 'tracker',
            value: { 'name': 'PageView' }
        });
    </script>
