<!DOCTYPE html>
<!-- ctv_creative 系列查廣告頁 -->
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>Document</title>
    </head>

    <body style="margin: 0">
        <div id="oneadDisplayTag"></div>
        <script type="text/javascript">
            function oneadLibAppend() {
                var jsDom = document.createElement('script');
                jsDom.src = 'https://ad-specs.guoshipartners.com/static/js/onead-lib.min.js';
                const node = document.getElementsByTagName('body')[0];
                node.appendChild(jsDom);
            }

            function getURLParams() {
                const queryParams = window.location.search;
                const searchParams = new URLSearchParams(queryParams);
                const params = {};
                for (const [key, value] of searchParams.entries()) {
                    params[key] = value;
                }
                return params;
            }

            function getExternalURL(host) {
                let url;
                switch (host) {
                    case 'staging':
                        url = 'https://staging.onead.com.tw/';
                        break;
                    case 'rd':
                        url = 'https://rd.guoshi.com.tw/';
                        break;
                    default:
                        url = 'https://onead.onevision.com.tw/';
                        break;
                }
                return url;
            }

            const urlParams = getURLParams();
            var _ONEAD = {};
            _ONEAD.pub = {};
            _ONEAD.pub.slotobj = document.getElementById('oneadDisplayTag');
            _ONEAD.pub.slots = ['div-onead-ad'];
            _ONEAD.pub.dedicated_pid = urlParams.pid;
            _ONEAD.pub.uid = urlParams.uid;
            _ONEAD.pub.host = getExternalURL(urlParams.host);
            _ONEAD.pub.player_mode_div = 'div-onead-ad';
            _ONEAD.pub.player_mode = 'ctv-creative';
            _ONEAD.pub.google_view_pixel = '';
            if (urlParams.hhid) _ONEAD.pub.hhid = urlParams.hhid;
            _ONEAD.pub.google_view_click = '';
            _ONEAD.pub.servingFlag = '1'; //exclude = 1
            var ONEAD_pubs = ONEAD_pubs || [];
            ONEAD_pubs.push(_ONEAD);
            oneadLibAppend();
        </script>
    </body>
</html>
