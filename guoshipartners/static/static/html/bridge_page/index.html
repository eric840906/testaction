<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bridge</title>
</head>

<style>
  body {
    margin: 0;
  }

  #bridge-frame {
    border: none;
    width: 100%;
    height: 100vh;
  }

  #bridge-video {
    transition: all 0.5s ease;
  }
</style>

<body>
  <!-- <h1>bridge page</h1> -->
  <div id="bridge">
    <video id="bridge-video" controls width="100%" playsinline="true" webkit-playsinline="true" crossorigin="anonymous"
      autoplay muted></video>
    <iframe id="bridge-frame" scrolling="no"></iframe>
  </div>
  <script>
    const bridgeVideo = document.getElementById('bridge-video')
    const bridgeFrame = document.getElementById('bridge-frame')
    const params = {}
    const searchParams = new URLSearchParams(window.location.search)
    for (let [key, value] of searchParams) {
      params[key] = value
    }
    bridgeVideo.src = params.video
    const observerCallback = (entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          console.log('play')
          bridgeVideo.play()
        } else {
          console.log('pause')
          bridgeVideo.pause()
        }
      })
    }
    const options = {
      root: null,
      rootMargin: '0px',
      threshold: 0.5
    }
    const observer = new IntersectionObserver(observerCallback, options)
    observer.observe(bridgeVideo)
    bridgeFrame.addEventListener('load', function () {
      window.scrollTo(0, 0)
      console.log('iframe ready')
      document.title = new URL(bridgeFrame.src).hostname
      window.addEventListener('scroll', () => {
        if (window.scrollY > bridgeFrame.offsetTop) {
          console.log(123)
          bridgeFrame.scrolling = ''
          bridgeVideo.style.display = 'none'
        }
      })
    })
    const parseXml = async () => {
      const parser = new DOMParser()
      const xml = await fetch(params.xml)
        .then(res => res.text())
        .then(res => parser.parseFromString(res, 'text/xml'))
        .then(res => res)
      function xml2json(xml) {
        try {
          var obj = {}
          if (xml.children.length > 0) {
            for (var i = 0; i < xml.children.length; i++) {
              var item = xml.children.item(i)
              var nodeName = item.nodeName

              if (typeof obj[nodeName] === 'undefined') {
                obj[nodeName] = xml2json(item)
              } else {
                if (typeof obj[nodeName].push === 'undefined') {
                  var old = obj[nodeName]

                  obj[nodeName] = []
                  obj[nodeName].push(old)
                }
                obj[nodeName].push(xml2json(item))
              }
            }
          } else {
            obj = xml.textContent
          }
          return obj
        } catch (e) {
          console.log(e.message)
        }
      }
      let obj = xml2json(xml)
      console.log(obj)
      bridgeFrame.src = obj.xml.linkXml.clickURL
    }
    parseXml()
  </script>
</body>

</html>
