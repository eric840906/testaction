<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>onead_redirect</title>
    </head>

    <body>
        <script>
            function init_onead_pixel(client_id, evt) {
                if (client_id) {
                    var s = document.createElement('script'),
                        el = document.getElementsByTagName('script')[0];
                    s.async = true;
                    s.src = 'https://pixel.onead.com.tw/static/js/onead-pixel.min.js';
                    el.parentNode.insertBefore(s, el);

                    window.onead_pixel = window.onead_pixel || [];
                    window.onead_pixel.push({
                        uid: client_id,
                        type: 'init',
                    });
                    window.onead_pixel.push({
                        type: 'tracker',
                        value: { name: 'Lead', 'content_name': evt },
                    });
                }
            }

            // 未加上協議的防呆
            function checkProtocal(url) {
                if (url.indexOf('https://') === -1 && url.indexOf('http://') === -1) {
                    url = `https://${url}`;
                }
                return url;
            }

            (function () {
                var finalLandingPage;
                // var location = 'https://ad-specs.guoshipartners.com/static/redirect/index.html?ios=XXXXXX&android=OOOOOO'
                // var url = 'https://ad-specs.guoshipartners.com/static/html/redirect.html?ios=https://www.onead.com.tw&android=google.com.tw&default=https://www.bnext.com.tw/&client_id=24482512&evt=TTD_click';

                if (location.href.indexOf('redirect') > -1) {
                    let is_android = navigator.userAgent.toLowerCase().indexOf('android') > -1;
                    let is_iphone = navigator.userAgent.toLowerCase().indexOf('iphone') > -1;
                    let is_ipad = navigator.userAgent.toLowerCase().indexOf('ipad') > -1;
                    let is_ipod = navigator.userAgent.toLowerCase().indexOf('ipod') > -1;
                    let is_ios = is_ipod || is_ipad || is_iphone;

                    const urlObj = new URL(location.href).searchParams;
                    const iosRedirect = urlObj.get('ios');
                    const androidRedirect = urlObj.get('andriod');
                    const defaultRedirect = urlObj.get('default');
                    const clientID = urlObj.get('client_id');
                    const eventName = urlObj.get('evt');


                    init_onead_pixel(clientID, eventName);

                    if (is_ios) {
                        finalLandingPage = iosRedirect || defaultRedirect;
                    } else if (is_android) {
                        finalLandingPage = androidRedirect || defaultRedirect;
                    } else {
                        finalLandingPage = defaultRedirect;
                    }
                    if (finalLandingPage) {
                        finalLandingPage = checkProtocal(finalLandingPage);
                        setTimeout(() => {
                            // open landing page
                            window.location = finalLandingPage;
                        }, 50);
                    } else {
                        alert('Default 網址為必填，請確認是否已填寫');
                    }
                }
            })();
        </script>
    </body>
</html>
