            async function getXmlInfo() {
                //帶入要發送請求的網址，與格式(get、post 等)
                await fetch(xmlSrc, { method: 'get' })
                    .then((response) => response.text())
                    .then((str) => new window.DOMParser().parseFromString(str, 'text/xml'))
                    .then(function (data) {
                        // 等待對方回傳資料後執行
                        weatherData.temp.value = parseInt(data.querySelectorAll('Temp')[0].textContent).toString();
                        weatherData.todayTemp.tempMax = parseInt(data.querySelectorAll('TempMax')[0].textContent).toString();
                        weatherData.todayTemp.tempMin = parseInt(data.querySelectorAll('TempMin')[0].textContent).toString();
                        weatherData.humi.value = data.querySelectorAll('Humi')[0].textContent;
                        weatherData.aqi.value = data.querySelectorAll('AQI')[0].textContent;
                        weatherData.uvi.value = data.querySelectorAll('UVI')[0].textContent;
                        weatherData.pop.value = data.querySelectorAll('Pop')[0].textContent;
                        if (data.querySelectorAll('Desc').length > 0) {
                            // desc 資訊補上後刪除
                            weatherData.desc.value = data.querySelectorAll('Desc')[0].textContent;
                        }
                    });

                addinfo = document.getElementById('addinfo');
                buildWeatherInfoContainer();
                if (params['showDate'] !== 'hide') {
                    buildDateContainer();
                    weatherInfoContainer.style.width = '70%';
                    weatherInfoContainer.querySelectorAll('div').forEach((element) => {
                        if (params.templateSize === '1.25') {
                            element.style.setProperty('justify-content', 'space-between', 'important');
                        } else {
                            element.style.setProperty('justify-content', 'space-evenly', 'important');
                        }
                    });
                }
                getDisplay();
                getWeatherDiv();
                weatherStatus();

                showingTimer(duration);
            }

            function buildDateContainer() {
                let dateContainer = document.createElement('div');
                dateContainer.id = 'onead-date-container';
                if (params.templateSize === '1.25') {
                    dateContainer.style.width = '28%';
                }
                dateContainer.appendChild(this.buildDateContent());
                addinfo.appendChild(dateContainer);
            }

            // 建立日期內容
            function buildDateContent() {
                let dateDom = document.createElement('div');
                dateDom.id = 'onead-date';

                // 設定顯示日期
                let today = new Date();
                let dateStr;
                dateStr = today.getMonth() + 1 + ' 月 ' + today.getDate() + ' 日 ';
                // 設定顯示星期幾
                let dayNum = today.getDay();
                let week;
                switch (dayNum) {
                    case 0:
                        week = '星 期 日';
                        break;
                    case 1:
                        week = '星 期 一';
                        break;
                    case 2:
                        week = '星 期 二';
                        break;
                    case 3:
                        week = '星 期 三';
                        break;
                    case 4:
                        week = '星 期 四';
                        break;
                    case 5:
                        week = '星 期 五';
                        break;
                    case 6:
                        week = '星 期 六';
                        break;
                }

                dateDom.innerHTML = `<p>${dateStr}</p> <p>${week}</p>`;
                dateDom.style.fontSize = params.templateSize === '1.25' ? '5.5vw' : '4.5vw';
                dateDom.style.lineHeight = '5.7vw';
                addinfo.appendChild(dateDom);

                return dateDom;
            }

            // 設定是否顯示
            function getDisplay() {
                for (const key in params) {
                    if (params[key] == 'yes') {
                        displayArr[key] = true;
                    } else if (params[key] == 'no' || params[key] == '') {
                        displayArr[key] = false;
                    }
                }
            }

            function buildWeatherInfoContainer() {
                weatherInfoContainer = document.createElement('div');
                weatherInfoContainer.id = 'weather-info-container';

                weatherInfoContainer.appendChild(buildInfoContent('temp'));
                weatherInfoContainer.appendChild(buildInfoContent('todayTemp'));
                weatherInfoContainer.appendChild(buildInfoContent('humi'));
                weatherInfoContainer.appendChild(buildInfoContent('aqi'));
                weatherInfoContainer.appendChild(buildInfoContent('uvi'));
                weatherInfoContainer.appendChild(buildInfoContent('pop'));

                addinfo.appendChild(weatherInfoContainer);
            }

            //  選取 img 元素放入 imgArr 中
            function getImgTag() {
                imgArr['temp'] = document.querySelector('#onead-temp img');
                imgArr['todayTemp'] = document.querySelector('#onead-today-temp img');
                imgArr['humi'] = document.querySelector('#onead-humi img');
                imgArr['aqi'] = document.querySelector('#onead-aqi img');
                imgArr['uvi'] = document.querySelector('#onead-uvi img');
                imgArr['pop'] = document.querySelector('#onead-pop img');
            }

            function buildInfoContent(weatherType) {
                // 建立天氣資訊容器
                let weatherInfoDom = document.createElement('div');
                weatherInfoDom.id = 'onead-' + weatherType;
                weatherInfoDom.classList.add('weatherInfoContent');
                weatherInfoDom.style.padding = '0px 10px 0px 3px';
                // 建立溫度標題
                let weatherInfoTitle = document.createElement('div');
                weatherInfoTitle.id = `onead-${weatherType}-title`;
                weatherInfoTitle.classList.add('title');
                weatherInfoTitle.innerHTML = weatherTitleArr[weatherType];
                weatherInfoTitleSize = { temp: 5.7, todayTemp: 5.7, humi: 5.7, aqi: 4.5, uvi: 4.5, pop: 5.7 };
                weatherInfoTitleLH = { temp: '7.4vw', todayTemp: '7.4vw', humi: '7.4vw', aqi: '5.9vw', uvi: '5.9vw', pop: '7.4vw' };
                weatherInfoTitle.querySelectorAll('p').forEach((element) => {
                    element.style.setProperty('font-size', `${params.templateSize === '1.25' ? weatherInfoTitleSize[weatherType] * 1.2 : weatherInfoTitleSize[weatherType]}vw`, 'important');
                    element.style.setProperty('line-height', weatherInfoTitleLH[weatherType], 'important');
                });

                weatherInfoDom.appendChild(weatherInfoTitle);

                // 建立溫度 icon
                let weatherInfoIcon = document.createElement('img');
                weatherInfoIcon.id = `onead-${weatherType}-icon`;
                weatherInfoIcon.classList.add('icon');
                switch (weatherType) {
                    case 'temp':
                        weatherInfoIcon.src = getWeatherImgSrc(weatherDescFilter(weatherData.temp.value));
                        break;
                    case 'todayTemp':
                        weatherInfoIcon.src = tempImgPath;
                        break;
                    case 'humi':
                        weatherInfoIcon.src = humiImgPath;
                        break;
                    case 'aqi':
                        weatherInfoIcon.src = getAQISrc(weatherData.aqi.value);
                        break;
                    case 'uvi':
                        weatherInfoIcon.src = uviImagePath;
                        break;
                    case 'pop':
                        weatherInfoIcon.src = popImgPath;
                        break;
                    default:
                        weatherInfoIcon.src = tempImgPath;
                        break;
                }

                if (params.templateSize === '1.25') {
                    weatherInfoIcon.style.width = `${13 * 1.2}vw`;
                    weatherInfoIcon.style.height = `${13 * 1.2}vw`;
                    weatherInfoIcon.style.position = `absolute`;
                    weatherInfoIcon.style.left = weatherType === 'todayTemp' ? `46%` : `50%`;
                    weatherInfoIcon.style.transform = `translateX(-50%)`;
                }

                weatherInfoDom.appendChild(weatherInfoIcon);

                // 建立溫度數字
                let weatherInfoText = document.createElement('div');
                weatherInfoText.id = 'weatherInfo-text';
                let infoTextCss;
                if (params.templateSize === '1.25') {
                    infoTextCss = `margin-right: 10px`;
                } else {
                }
                switch (weatherType) {
                    case 'temp':
                        weatherInfoText.innerHTML = `<p style="${infoTextCss}">${weatherData.temp.value}℃</p>`;
                        break;
                    case 'todayTemp':
                        weatherInfoText.innerHTML = `<p style="${infoTextCss}">${weatherData.todayTemp.tempMin}℃ - ${weatherData.todayTemp.tempMax}℃</p>`;
                        break;
                    case 'humi':
                        weatherInfoText.innerHTML = `<p style="${infoTextCss}">${weatherData.humi.value}%</p>`;
                        break;
                    case 'aqi':
                        weatherInfoText.innerHTML = `<p style="white-space:wrap; width: 21vw; ${infoTextCss}">${getAQIText(weatherData.aqi.value)}</p>`;
                        break;
                    case 'uvi':
                        weatherInfoText.innerHTML = `<p style="${infoTextCss}">${getUVIText(weatherData.uvi.value)}</p>`;
                        break;
                    case 'pop':
                        weatherInfoText.innerHTML = `<p style="width: 21vw; ${infoTextCss}">${Math.round(weatherData.pop.value * 100)}%</p>`;
                        break;
                }
                weatherInfoTextSize = { temp: 8.8, todayTemp: 5, humi: 8.8, aqi: 4.5, uvi: 5.7, pop: 8.2 };
                weatherInfoText.querySelectorAll('p').forEach((element) => {
                    element.style.setProperty('font-size', `${params.templateSize === '1.25' ? weatherInfoTextSize[weatherType] * 1.25 : weatherInfoTextSize[weatherType]}vw`, 'important');
                });

                weatherInfoDom.appendChild(weatherInfoText);
                return weatherInfoDom;
            }

            // 選取 img 容器放入 weatherDiv 中
            function getWeatherDiv() {
                weatherDiv['temp'] = document.querySelector('#onead-temp');
                weatherDiv['todayTemp'] = document.querySelector('#onead-todayTemp');
                weatherDiv['humi'] = document.querySelector('#onead-humi');
                weatherDiv['aqi'] = document.querySelector('#onead-aqi');
                weatherDiv['uvi'] = document.querySelector('#onead-uvi');
                weatherDiv['pop'] = document.querySelector('#onead-pop');
            }

            // 設定 溫度文字 濕度文字 AQI圖片 UVI圖片
            function weatherStatus() {
                this.getImgTag();
            }

            function weatherDescFilter(descValue) {
                let newDescValue;
                switch (descValue) {
                    case 'few clouds: 11-25%':
                        newDescValue = 'few clouds';
                        break;
                    case 'scattered clouds: 25-50%':
                        newDescValue = 'scattered clouds';
                        break;
                    case 'broken clouds: 51-84%':
                    case 'overcast clouds: 85-100%':
                    case 'overcast clouds':
                        newDescValue = 'broken clouds';
                        break;
                    case 'light rain':
                    case 'moderate rain':
                    case 'heavy intensity rain':
                    case 'very heavy rain':
                    case 'extreme rain':
                        newDescValue = 'rain';
                        break;
                    case 'light intensity drizzle':
                    case 'drizzle':
                    case 'heavy intensity drizzle':
                    case 'light intensity drizzle rain':
                    case 'drizzle rain':
                    case 'heavy intensity drizzle rain':
                    case 'shower rain and drizzle':
                    case 'heavy shower rain and drizzle':
                    case 'shower drizzle':
                    case 'light intensity shower rain':
                    case 'shower rain':
                    case 'heavy intensity shower rain':
                    case 'ragged shower rain':
                        newDescValue = 'shower rain';
                        break;
                    case 'thunderstorm with light rain':
                    case 'thunderstorm with rain':
                    case 'thunderstorm with heavy rain':
                    case 'light thunderstorm':
                    case 'thunderstorm':
                    case 'heavy thunderstorm':
                    case 'ragged thunderstorm':
                    case 'thunderstorm with light drizzle':
                    case 'thunderstorm with drizzle':
                    case 'thunderstorm with heavy drizzle':
                        newDescValue = 'thunderstorm';
                        break;
                    case 'freezing rain':
                    case 'light snow':
                    case 'Snow':
                    case 'Heavy snow':
                    case 'Sleet':
                    case 'Light shower sleet':
                    case 'Shower sleet':
                    case 'Light rain and snow':
                    case 'Rain and snow':
                    case 'Light shower snow':
                    case 'Shower snow':
                    case 'Heavy shower snow':
                        newDescValue = 'snow';
                        break;
                    case 'mist':
                    case 'Smoke':
                    case 'Haze':
                    case 'sand/ dust whirls':
                    case 'fog':
                    case 'sand':
                    case 'dust':
                    case 'volcanic ash':
                    case 'squalls':
                    case 'tornado':
                        newDescValue = 'mist';
                        break;
                    default:
                        newDescValue = descValue;
                        break;
                }
                return newDescValue;
            }

            // 設定 weather desc 圖片路徑
            function getWeatherImgSrc(descValue) {
                let path;
                switch (descValue) {
                    case 'clear sky':
                        path = weatherImgPath[1];
                        break;
                    case 'few clouds':
                        path = weatherImgPath[2];
                        break;
                    case 'scattered clouds':
                        path = weatherImgPath[3];
                        break;
                    case 'broken clouds':
                        path = weatherImgPath[4];
                        break;
                    case 'shower rain':
                        path = weatherImgPath[5];
                        break;
                    case 'rain':
                        path = weatherImgPath[6];
                        break;
                    case 'thunderstorm':
                        path = weatherImgPath[7];
                        break;
                    case 'snow':
                        path = weatherImgPath[8];
                        break;
                    case 'mist':
                        path = weatherImgPath[9];
                        break;
                    default:
                        path = weatherImgPath[1];
                        break;
                }
                return path;
            }

            // 設定 AQI 圖片路徑
            function getAQISrc(aqiValue) {
                aqiValue = parseInt(aqiValue);
                let path = aqiImagePath[1];
                if (aqiValue >= 51 && aqiValue <= 100) {
                    path = aqiImagePath[2];
                } else if (aqiValue >= 101 && aqiValue <= 150) {
                    path = aqiImagePath[3];
                } else if (aqiValue >= 151 && aqiValue <= 200) {
                    path = aqiImagePath[4];
                } else if (aqiValue >= 201 && aqiValue <= 300) {
                    path = aqiImagePath[5];
                } else if (aqiValue >= 301) {
                    path = aqiImagePath[6];
                }
                return path;
            }

            // 設定 AQI Text
            function getAQIText(aqiValue) {
                aqiValue = parseInt(aqiValue);
                let statusText = '良好';
                if (aqiValue >= 51 && aqiValue <= 100) {
                    statusText = '普通';
                } else if (aqiValue >= 101 && aqiValue <= 150) {
                    statusText = '敏感族群不良';
                } else if (aqiValue >= 151 && aqiValue <= 200) {
                    statusText = '所有族群不良';
                } else if (aqiValue >= 201 && aqiValue <= 300) {
                    statusText = '非常不良';
                } else if (aqiValue >= 301) {
                    statusText = '有害';
                }
                return statusText;
            }

            // 設定 UVI 圖片路徑
            function getUVIText(uviValue) {
                uviValue = parseInt(uviValue);
                let statusText = '低量級';
                if (uviValue >= 3 && uviValue <= 5) {
                    statusText = '中量級';
                } else if (uviValue >= 6 && uviValue <= 7) {
                    statusText = '高量級';
                } else if (uviValue >= 8 && uviValue <= 10) {
                    statusText = '過量級';
                } else if (uviValue >= 11) {
                    statusText = '危險級';
                }
                return statusText;
            }

            // 把要顯示的 img 容器放入 infoToDisplay 中
            function showDivs() {
                var infoToDisplay = [];
                for (const key in displayArr) {
                    if (displayArr[key] && typeof weatherDiv[key] === 'object') {
                        infoToDisplay.push(weatherDiv[key]);
                    }
                }
                return infoToDisplay;
            }

            function showingTimer(time) {
                let nowIndex = 0;
                let enableWeatherDivs = showDivs();
                if (enableWeatherDivs.length <= 0) {
                    return;
                }
                enableWeatherDivs[nowIndex].style.opacity = '1';
                nowIndex++;

                setInterval(() => {
                    if (enableWeatherDivs.length <= 1) {
                        return;
                    }
                    enableWeatherDivs.forEach((element) => {
                        element.style.setProperty('opacity', '0');
                    });
                    enableWeatherDivs[nowIndex].style.opacity = '1';

                    nowIndex++;
                    if (nowIndex >= enableWeatherDivs.length) {
                        nowIndex = 0;
                    }
                }, time);
            }
        </script>
